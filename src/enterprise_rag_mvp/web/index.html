<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Trace Chat</title>
    <link rel="stylesheet" href="/static/app.css?v=20260615-next-context" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-pane" aria-label="RAG chat">
        <header class="topbar">
          <div>
            <h1>ChatLearning</h1>
          </div>
          <nav class="topbar-actions" aria-label="页面导航">
            <a class="secondary-action" href="/admin">管理</a>
            <a class="secondary-action" href="/docs">演进文档</a>
          </nav>
        </header>

        <div id="messages" class="messages">
          <article class="message assistant">
            <div class="avatar">AI</div>
            <div class="bubble">
              输入一句企业制度问题，我会返回命中的制度依据，并在右侧展示 RAG 每一步发生了什么。
            </div>
          </article>
        </div>

        <form id="chatForm" class="composer">
          <input
            id="messageInput"
            name="message"
            type="text"
            autocomplete="off"
            value="员工年假规则是什么？"
            aria-label="输入企业制度问题"
          />
          <button type="submit">发送</button>
        </form>
      </section>

      <aside class="trace-pane" aria-label="RAG trace">
        <header class="trace-header">
          <div class="trace-title-group">
            <div class="workflow-control-row">
              <label class="workflow-control" for="workflowSelect">
                <span>执行流程</span>
                <select id="workflowSelect" class="workflow-select" aria-label="选择 AI 执行流程"></select>
              </label>
              <a id="langfuseTraceLink" class="langfuse-link status-disabled" aria-disabled="true">Langfuse 未启用</a>
            </div>
            <p id="traceSummary">选择一个流程节点查看细节</p>
          </div>
          <button id="clearButton" type="button">清空</button>
        </header>
        <div id="traceSteps" class="trace-steps">
          <div class="empty-state">选择流程后，这里会展示顺序、并行、汇聚节点。发送问题后，RAG 节点会叠加本次执行详情。</div>
        </div>
      </aside>
    </main>


    <script src="/static/app.js?v=20260615-next-context"></script>
  </body>
</html>
